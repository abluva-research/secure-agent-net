# Hybrid-SaaS: Kube-Agent (Launcher) — deployed on tenant's cluster
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent
  namespace: <tenant-namespace>
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-role
  namespace: <tenant-namespace>
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "secrets", "configmaps", "serviceaccounts", "persistentvolumeclaims", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["skupper.io"]
    resources: ["sites", "connectors", "listeners", "accesstokens", "accessgrants", "links", "routeraccesses"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["skupper.io"]
    resources: ["sites/status", "connectors/status", "listeners/status", "accesstokens/status", "accessgrants/status", "links/status", "routeraccesses/status"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-binding
  namespace: <tenant-namespace>
subjects:
  - kind: ServiceAccount
    name: agent
    namespace: <tenant-namespace>
roleRef:
  kind: Role
  name: agent-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: <tenant-namespace>
  labels:
    tier: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: agent
  template:
    metadata:
      labels:
        tier: agent
    spec:
      serviceAccountName: agent
      containers:
        - name: agent-container
          image: 172.16.1.87:5000/ablv-launcher:v28
          ports:
            - containerPort: 5004
          env:
             - name: INFRA_BASE_URL
              value: "http://control-server:80"
            - name: SAAS_API_KEY
              value: "<SAAS_API_KEY_PLACEHOLDER>"  
            - name: X_ABLV_Tenant_ID
              value: "<TENANT_ID_PLACEHOLDER>"
            - name: X_ABLV_Environment_ID
              value: "<ENVIRONMENT_ID_PLACEHOLDER>" 
            - name: X_ABLV_Principal
              value: "<PRINCIPAL_PLACEHOLDER>"  
---
apiVersion: v1
kind: Service
metadata:
  name: agent-svc
  namespace: <tenant-namespace>
  labels:
    tier: agent
spec:
  type: ClusterIP
  selector:
    tier: agent
  ports:
    - protocol: TCP
      port: 5004
      targetPort: 5004
---
apiVersion: skupper.io/v2alpha1
kind: Connector
metadata:
  name: agent-connector
  namespace: <tenant-namespace>
spec:
  routingKey: agent
  selector: tier=agent
  port: 5004
