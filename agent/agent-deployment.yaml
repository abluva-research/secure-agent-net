# Hybrid-SaaS: Kube-Agent (Launcher) — deployed on tenant's cluster
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent
  namespace: efecc4f6-79d4-42d9-b893-7c011367a7b5-e83f8bff-73be-4651-8a0d-eb
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-role
  namespace: efecc4f6-79d4-42d9-b893-7c011367a7b5-e83f8bff-73be-4651-8a0d-eb
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "secrets", "configmaps", "serviceaccounts", "persistentvolumeclaims", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["skupper.io"]
    resources: ["sites", "connectors", "listeners", "accesstokens", "accessgrants", "links", "routeraccesses"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["skupper.io"]
    resources: ["sites/status", "connectors/status", "listeners/status", "accesstokens/status", "accessgrants/status", "links/status", "routeraccesses/status"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-binding
  namespace: efecc4f6-79d4-42d9-b893-7c011367a7b5-e83f8bff-73be-4651-8a0d-eb
subjects:
  - kind: ServiceAccount
    name: agent
    namespace: efecc4f6-79d4-42d9-b893-7c011367a7b5-e83f8bff-73be-4651-8a0d-eb
roleRef:
  kind: Role
  name: agent-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: efecc4f6-79d4-42d9-b893-7c011367a7b5-e83f8bff-73be-4651-8a0d-eb
  labels:
    tier: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      tier: agent
  template:
    metadata:
      labels:
        tier: agent
    spec:
      serviceAccountName: agent
      containers:
        - name: agent-container
          image: 172.16.1.87:5000/ablv-launcher:v24
          ports:
            - containerPort: 5004
          env:
            - name: TASK_URL
              value: "http://control-server:80/api/v1/control/tasks"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-svc
  namespace: efecc4f6-79d4-42d9-b893-7c011367a7b5-e83f8bff-73be-4651-8a0d-eb
  labels:
    tier: agent
spec:
  type: ClusterIP
  selector:
    tier: agent
  ports:
    - protocol: TCP
      port: 5004
      targetPort: 5004
---
apiVersion: skupper.io/v2alpha1
kind: Connector
metadata:
  name: agent-connector
  namespace: efecc4f6-79d4-42d9-b893-7c011367a7b5-e83f8bff-73be-4651-8a0d-eb
spec:
  routingKey: agent
  selector: tier=agent
  port: 5004
